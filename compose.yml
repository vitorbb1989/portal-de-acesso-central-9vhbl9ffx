services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-console-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.portal-console-web.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.portal-console-web.entrypoints=${TRAEFIK_ENTRYPOINTS}"
      - "traefik.http.routers.portal-console-web.tls=${TRAEFIK_TLS}"
      - "traefik.http.routers.portal-console-web.tls.certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.portal-console-web.service=portal-console-web"
      - "traefik.http.services.portal-console-web.loadbalancer.server.port=80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portal-console-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3333/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: https://${TRAEFIK_HOST}
      PORT: 3333
      NODE_ENV: production
      TRUST_PROXY: ${TRUST_PROXY:-1}
      SEED_ON_START: ${SEED_ON_START:-false}
    volumes:
      - portal_console_data:/app/data
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.portal-console-api.rule=Host(`${TRAEFIK_HOST}`) && (PathPrefix(`/api`) || Path(`/health`))"
      - "traefik.http.routers.portal-console-api.priority=100"
      - "traefik.http.routers.portal-console-api.entrypoints=${TRAEFIK_ENTRYPOINTS}"
      - "traefik.http.routers.portal-console-api.tls=${TRAEFIK_TLS}"
      - "traefik.http.routers.portal-console-api.tls.certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.portal-console-api.service=portal-console-api"
      - "traefik.http.services.portal-console-api.loadbalancer.server.port=3333"

volumes:
  portal_console_data:

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
